---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: loan-model-pipeline-cron
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pipeline
          restartPolicy: Never
          containers:
            - name: trigger
              image: quay.io/openshift/origin-cli:latest
              command: [/bin/sh, -c]
              args:
                - |
                  oc create -f - <<EOF
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    generateName: loan-model-pipeline-
                    namespace: {{ .Release.Namespace }}
                  spec:
                    pipelineRef:
                      name: loan-model-pipeline
                    params:
                      - name: s3-bucket
                        value: data
                      - name: s3-file-key
                        value: {{ if .Values.dataUrl }}{{ base .Values.dataUrl }}{{ else }}cleaned_loan_data.csv{{ end }}
                      - name: namespace
                        value: {{ .Release.Namespace }}
                    workspaces:
                      - name: ws
                        persistentVolumeClaim:
                          claimName: loan-pipeline-ws
                  EOF
