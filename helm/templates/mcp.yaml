{{- if .Values.modelName }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: {{ .Values.mcpImage | quote }}
          env:
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_PORT
              value: "8000"
            - name: MODEL_NAME
              value: {{ .Values.modelName | quote }}
            - name: INFER_ENDPOINT
              value: "http://{{ .Values.modelName }}-predictor.{{ .Release.Namespace }}.svc.cluster.local"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: mcp-server
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mcp-server
  namespace: {{ .Release.Namespace }}
spec:
  to:
    kind: Service
    name: mcp-server
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
